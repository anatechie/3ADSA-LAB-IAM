<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Gestão de Pedidos - Vendedor</title>
</head>

<body>

    <div class="overlay" id="overlay-menu" onclick="toggleMenu()"></div>

   <aside class="sidebar" id="sidebar-menu">
    <h2>Menu</h2>
    <nav class="nav-menu">
        
        <a href="index.html" class="nav-link"><span class="material-icons">list</span> Histórico</a>
        <a href="minhasCompras.html" class="nav-link"><span class="material-icons">shopping_cart</span> Detalhes do Pedido</a>
        <a href="checkout.html" class="nav-link"><span class="material-icons">credit_card</span> Finalizar Pedido</a>
        <a href="vendedor.html" class="nav-link"><span class="material-icons">dashboard</span> Gestão Vendedor</a>
    </nav>
</aside>

    <header class="navbar">
        <button class="menu-btn" onclick="toggleMenu()">
            <span class="material-icons">menu</span>
        </button>
        <h1>Painel do Vendedor</h1>
        <div class="user-icon"><span class="material-icons">person</span></div>
    </header>

    <main class="conteudo">
        <div class="acoes-topo" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div class="busca-container" style="flex: 1; margin-right: 20px;">
                <input type="text" placeholder="Buscar por ID ou Cliente..." class="search-bar"
                    style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
            </div>
            <button class="btn-primary" onclick="abrirModalCadastro()">+ Novo Pedido</button>
        </div>

        <div class="grid-vendedor" id="grid-vendedor">
            <p class="carregando">Sincronizando com o banco de dados...</p>
        </div>
    </main>

    <!-- MODAL DE CADASTRO (O "Create" do CRUD) -->
    <div id="modalPedido" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="material-icons">add_shopping_cart</span>
                <h3>Lançar Novo Pedido</h3>
            </div>
            <div class="modal-body">
                <label for="new-id-cliente">ID do Cliente:</label>
                <input type="number" id="new-id-cliente" placeholder="Ex: 1">

                <label for="new-valor">Valor Total (R$):</label>
                <input type="number" id="new-valor" step="0.01" placeholder="0.00">

                <div class="modal-acoes" style="margin-top: 20px;">
                    <button class="btn-blue" onclick="salvarPedido()">GERAR PEDIDO</button>
                    <button class="btn-red" onclick="fecharModalPedido()">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
